server {
    listen 80;
    server_name raspb215.univ-lr.fr;

    root /var/www/html;
    index index.html perso.html;

    location ~ ^/~([^/]+)(/.*)?$ {
        alias /home/$1/public_html$2;
        index index.html perso.html;
        autoindex off;
        location ~ \.php$ {
            include /etc/nginx/fastcgi-php.conf;
            fastcgi_pass php-fpm:9000;
        }
    }
    location ~ \.php$ {
        include /etc/nginx/fastcgi-php.conf;
        fastcgi_pass php-fpm:9000;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
